<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>建立活動 — PayClub</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css"><script src="pc_auth.js"></script>
<style>
body{display:flex;}
.steps-outer{max-width:620px;margin-bottom:28px;}
.steps{display:flex;align-items:center;width:100%;}
.step-item{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.step-circle{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;color:var(--text3);transition:all 0.25s;flex-shrink:0;}
.step-item.active .step-circle{border-color:var(--accent);background:var(--accent);color:#fff;}
.step-item.done .step-circle{border-color:var(--green);background:var(--green);color:#fff;}
.step-line{flex:1;height:2px;background:var(--border);margin:0 12px;}
.step-line.done{background:var(--green);}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:32px;box-shadow:var(--shadow-md);margin-bottom:24px;}
.form-group{margin-bottom:24px;}
.form-label{display:block;font-size:0.82rem;font-weight:700;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.05em;}
.form-input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:0.95rem;font-family:inherit;transition:all 0.2s;outline:none;}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light);}
.role-option{display:flex;align-items:center;padding:16px;border:1.5px solid var(--border);border-radius:12px;cursor:pointer;transition:all 0.15s;margin-bottom:10px;gap:12px;}
.role-option:hover{border-color:var(--accent);background:var(--accent-light);}
.role-option.selected{border-color:var(--accent);background:var(--accent-light);box-shadow:0 0 0 1px var(--accent);}
.role-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
.role-option.selected .role-check{background:var(--accent);border-color:var(--accent);}
.role-option.selected .role-check::after{content:'✓';color:#fff;font-size:0.8rem;font-weight:700;}
.btn-row{display:flex;justify-content:flex-end;gap:12px;margin-top:32px;}
</style>
</head>
<body>

<div class="mobile-overlay" id="mobileOverlay" onclick="closeSidebar()"></div>
<nav class="mobile-nav">
  <div class="mobile-nav-logo"><span style="width:7px;height:7px;background:var(--accent);border-radius:50%;display:inline-block;margin-right:4px"></span>PayClub</div>
  <button class="hamburger" onclick="openSidebar()">☰</button>
</nav>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><div class="logo-dot"></div>PayClub</div>
  <nav class="sidebar-nav">
    <a class="nav-item" href="dashboard.html"><span class="icon">🏠</span>總覽</a>
    <a class="nav-item active" href="create.html"><span class="icon">➕</span>建立活動</a>
    <a class="nav-item" href="member.html"><span class="icon">🤝</span>加入活動</a>
    <a class="nav-item" href="report.html"><span class="icon">📊</span>財務報表</a>
    <div class="nav-section">我的活動</div>
    <div id="sidebarEvents"></div>
    <a class="nav-item" href="index.html"><span class="icon">🌐</span>首頁</a>
    <a class="nav-item" href="notifications.html" style="position:relative">
      <span class="icon">🔔</span>通知<span class="badge-notify" id="notifBadge" style="display:none">0</span>
    </a>
  </nav>
  <div class="sidebar-bottom">
    <div class="user-card">
      <div class="avatar" id="avatarInitial">?</div>
      <div class="user-info">
        <div class="user-name" id="userName">載入中</div>
        <div class="user-role" id="userEmail" style="font-size:0.6rem;opacity:0.8">...</div>
      </div>
      <button class="logout-btn" onclick="PC_logout()">登出</button>
    </div>
  </div>
</aside>

<main class="main">
  <div class="content" style="max-width:800px;">
    <div class="steps-outer">
      <div class="steps">
        <div id="si1" class="step-item active"><div class="step-circle">1</div><span style="font-size:0.85rem;font-weight:600;color:var(--text)">基本資訊</span></div>
        <div id="sl1" class="step-line"></div>
        <div id="si2" class="step-item"><div class="step-circle">2</div><span style="font-size:0.85rem;font-weight:600;color:var(--text3)">人員與權限</span></div>
        <div id="sl2" class="step-line"></div>
        <div id="si3" class="step-item"><div class="step-circle">3</div><span style="font-size:0.85rem;font-weight:600;color:var(--text3)">完成建立</span></div>
      </div>
    </div>

    <div id="s1" class="card">
      <h2 style="margin-bottom:8px;">建立新活動</h2>
      <p style="color:var(--text2);font-size:0.88rem;margin-bottom:28px;">填寫活動名稱與截止日期，開始管理您的團體帳務。</p>
      <div class="form-group">
        <label class="form-label">活動名稱</label>
        <input type="text" id="s1Title" class="form-input" placeholder="例如：2025 寒假系排集訓">
      </div>
      <div class="form-group">
        <label class="form-label">截止日期</label>
        <div style="display:flex;gap:10px;">
          <select id="dlYear" class="form-input" style="flex:1.5"></select>
          <select id="dlMonth" class="form-input" style="flex:1"></select>
          <select id="dlDay" class="form-input" style="flex:1"></select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">活動說明 (選填)</label>
        <textarea id="s1Desc" class="form-input" style="min-height:100px;resize:none;" placeholder="在此輸入活動的詳細說明或繳費備註..."></textarea>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="goStep(2)">下一步：設定人員</button>
      </div>
    </div>

    <div id="s2" class="card" style="display:none;">
      <h2 style="margin-bottom:8px;">人員與權限</h2>
      <p style="color:var(--text2);font-size:0.88rem;margin-bottom:24px;">您可以直接邀請成員或在建立後分享邀請連結。</p>
      
      <div class="form-group">
        <label class="form-label">邀請成員 (Email)</label>
        <div style="display:flex;gap:8px;margin-bottom:12px;">
          <input type="email" id="inviteEmail" class="form-input" placeholder="example@email.com">
          <input type="text" id="inviteName" class="form-input" style="width:120px" placeholder="姓名">
          <button class="btn btn-ghost" onclick="addInvitee()" style="white-space:nowrap;">新增</button>
        </div>
        
        <div class="form-label" style="font-size:0.75rem;">設定角色權限 (可多選)</div>
        <div style="display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:20px;">
          <div class="role-option" id="role_payer" onclick="toggleRole('payer')">
            <div class="role-check"></div>
            <div>
              <div style="font-weight:700;font-size:0.9rem">繳費者</div>
              <div style="font-size:0.75rem;color:var(--text3)">需要支付款項的成員</div>
            </div>
          </div>
          <div class="role-option" id="role_manager" onclick="toggleRole('manager')">
            <div class="role-check"></div>
            <div>
              <div style="font-weight:700;font-size:0.9rem">統計者</div>
              <div style="font-size:0.75rem;color:var(--text3)">協助核對帳款、編輯活動資訊</div>
            </div>
          </div>
          <div class="role-option" id="role_viewer" onclick="toggleRole('viewer')">
            <div class="role-check"></div>
            <div>
              <div style="font-weight:700;font-size:0.9rem">觀察者</div>
              <div style="font-size:0.75rem;color:var(--text3)">僅能查看報表與進度，無法編輯</div>
            </div>
          </div>
        </div>

        <div id="inviteList" style="display:flex;flex-wrap:wrap;gap:8px;"></div>
      </div>

      <div class="btn-row">
        <button class="btn btn-ghost" onclick="goStep(1)">上一步</button>
        <button class="btn btn-primary" onclick="submitCreate()">確認並建立活動</button>
      </div>
    </div>

    <div id="s3" class="card" style="display:none;text-align:center;">
      <h2 style="margin-bottom:8px;">活動建立成功！</h2>
      <div style="background:var(--bg);padding:24px;border-radius:12px;margin:24px 0;">
        <div id="inviteCodeDisp" style="font-size:2.2rem;font-weight:800;color:var(--accent);letter-spacing:4px;"></div>
      </div>
      <div class="form-group" style="text-align:left;">
        <label class="form-label">繳費連結</label>
        <div id="generatedLink" class="form-input" style="background:var(--bg);font-size:0.8rem;word-break:break-all;"></div>
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="location.href='dashboard.html'">進入儀表板</button>
    </div>
  </div>
</main>

<script>
let members = [];
let selectedRoles = new Set();

function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('mobileOverlay').classList.add('show');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('mobileOverlay').classList.remove('show');}
function toggleSideMenu(id){document.getElementById(id).classList.toggle('open');document.getElementById(id+'_icon').classList.toggle('open');}

function renderSidebar(){
  const evts = PC_getAllMyEvents();
  const created = evts.filter(e => e._isOwner);
  const joined = evts.filter(e => !e._isOwner);
  let html = '';
  html += `<div class="sidebar-menu-header" onclick="toggleSideMenu('mc')">已建立活動 <span class="chevron open" id="mc_icon">▼</span></div><div class="sidebar-menu-list open" id="mc">`;
  html += created.map(e => `<a class="nav-event" href="event.html?id=${e.id}"><span>${e.title}</span></a>`).join('') || '<div style="padding:4px 12px;font-size:0.74rem;color:var(--text3)">無資料</div>';
  html += `</div><div class="sidebar-menu-header" onclick="toggleSideMenu('mj')">已加入活動 <span class="chevron open" id="mj_icon">▼</span></div><div class="sidebar-menu-list open" id="mj">`;
  html += joined.map(e => `<a class="nav-event" href="event.html?id=${e.id}"><span>${e.title}</span></a>`).join('') || '<div style="padding:4px 12px;font-size:0.74rem;color:var(--text3)">無資料</div>';
  html += `</div>`;
  document.getElementById('sidebarEvents').innerHTML = html;
}

window.onload = () => {
  if(!PC_isLoggedIn()){ location.href='login.html'; return; }
  const user = PC_getUser();
  document.getElementById('userName').textContent = user.name || user.email;
  document.getElementById('userEmail').textContent = user.email;
  document.getElementById('avatarInitial').textContent = (user.name || user.email).slice(0,1).toUpperCase();
  renderSidebar();
  initDateSelects();
};

const yS=document.getElementById('dlYear'), mS=document.getElementById('dlMonth'), dS=document.getElementById('dlDay');
function initDateSelects(){
  const now = new Date();
  for(let i=0; i<5; i++) yS.add(new Option((now.getFullYear()+i)+'年', now.getFullYear()+i));
  for(let i=1; i<=12; i++) mS.add(new Option(i+'月', i));
  mS.value = now.getMonth()+1;
  updateDays();
  yS.onchange = updateDays; mS.onchange = updateDays;
}
function updateDays(){
  const y=parseInt(yS.value), m=parseInt(mS.value), days=new Date(y, m, 0).getDate();
  const prev=dS.value; dS.innerHTML='';
  for(let d=1; d<=days; d++) dS.add(new Option(d+'日', d));
  if(prev && prev<=days) dS.value=prev;
}

function toggleRole(role){
  if(selectedRoles.has(role)) selectedRoles.delete(role);
  else selectedRoles.add(role);
  document.getElementById('role_'+role).classList.toggle('selected');
}

function addInvitee(){
  const email = document.getElementById('inviteEmail').value.trim();
  const name = document.getElementById('inviteName').value.trim();
  if(!email || !selectedRoles.size){ PC_toast('請輸入 Email 並至少選擇一個角色'); return; }
  members.push({ email, name: name||email.split('@')[0], roles: Array.from(selectedRoles) });
  renderInviteeList();
  document.getElementById('inviteEmail').value = ''; document.getElementById('inviteName').value = '';
}

function renderInviteeList(){
  document.getElementById('inviteList').innerHTML = members.map((m,i)=>`
    <div class="badge" style="background:var(--accent-light);color:var(--accent);display:flex;gap:6px;align-items:center;">
      ${m.name} (${m.roles.length}) <span onclick="members.splice(${i},1);renderInviteeList()" style="cursor:pointer">×</span>
    </div>
  `).join('');
}

function goStep(n){
  [1,2,3].forEach(i=>{
    if(document.getElementById('s'+i)) document.getElementById('s'+i).style.display = (i===n?'block':'none');
    if(document.getElementById('si'+i)) document.getElementById('si'+i).className = (i<n?'step-item done':(i===n?'step-item active':'step-item'));
    if(document.getElementById('sl'+i)) document.getElementById('sl'+i).className = (i<n?'step-line done':'step-line');
  });
}

function submitCreate(){
  const user = PC_getUser();
  const title = document.getElementById('s1Title').value.trim();
  if(!title){ PC_toast('請輸入活動名稱'); return; }
  const dl = `${yS.value}-${mS.value.padStart(2,'0')}-${dS.value.padStart(2,'0')}`;
  const code = PC_genInviteCode();
  const id = 'e' + Date.now();
  
  const newEvt = {
    id, title, ownerEmail: user.email, amountMode: 'per_person', amount: 0,
    deadline: dl, desc: document.getElementById('s1Desc').value.trim(),
    status: 'active', inviteCode: code,
    members: members.map(m=>({ ...m, role: m.roles[0], status: 'pending_invite' }))
  };

  const evts = PC_getEvents(); evts.unshift(newEvt); PC_saveEvents(evts);
  document.getElementById('inviteCodeDisp').textContent = code;
  document.getElementById('generatedLink').textContent = location.href.replace('create.html','pay.html')+'?event='+id;
  goStep(3);
}
</script>
</body>
</html>
