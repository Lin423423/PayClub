<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>建立活動 — PayClub</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  
  :root {
    --bg: #020617;
    --surface: #0f172a;
    --card: #1e293b;
    --accent: #6366f1;
    --accent2: #10b981;
    --text: #f8fafc;
    --muted: #94a3b8;
    --border: rgba(148, 163, 184, 0.1);
    --shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Plus Jakarta Sans','Noto Sans TC',sans-serif; display:flex; }
  .sidebar { width:260px; background:var(--surface); height:100vh; position:fixed; border-right:1px solid var(--border); padding:30px 20px; }
  .main { margin-left:260px; flex:1; padding:60px; max-width:900px; }
  .form-group { margin-bottom:25px; }
  label { display:block; margin-bottom:10px; color:var(--muted); font-size:14px; }
  input, select, textarea { width:100%; padding:14px; background:var(--card); border:1px solid var(--border); border-radius:12px; color:white; font-size:16px; }
  .date-row { display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; }
  .member-item { display:inline-flex; align-items:center; background:var(--surface); padding:8px 15px; border-radius:30px; margin:5px; border:1px solid var(--accent); }
  .btn-save { background:var(--accent); color:white; padding:15px 40px; border-radius:12px; border:none; cursor:pointer; font-weight:700; width:100%; }
</style>
</head>
<body>
<div class="sidebar">
  <div style="font-size:22px; font-weight:800; color:var(--accent); margin-bottom:40px;">PayClub</div>
  <a href="dashboard.html" style="color:var(--text); text-decoration:none;">🏠 返回儀表板</a>
</div>
<div class="main">
  <h1>建立收款活動</h1>
  <div class="form-group">
    <label>活動名稱</label>
    <input id="title" placeholder="例如：114年度社費">
  </div>
  <div class="form-group">
    <label>收款模式</label>
    <select id="mode" onchange="toggleMode()">
      <option value="fixed">每人固定金額</option>
      <option value="total">總額平均分攤</option>
    </select>
  </div>
  <div class="form-group">
    <label id="amountLabel">每人應繳金額</label>
    <input type="number" id="amount" placeholder="0">
  </div>
  <div class="form-group">
    <label>截止日期</label>
    <div class="date-row">
      <select id="year"></select>
      <select id="month"></select>
      <select id="day"></select>
    </div>
  </div>
  <div class="form-group">
    <label>新增成員</label>
    <div style="display:flex; gap:10px; margin-bottom:10px;">
      <input id="memName" placeholder="姓名" style="flex:1">
      <select id="memType" style="width:120px">
        <option value="payer">繳費成員</option>
        <option value="admin">管理/統計</option>
      </select>
      <button onclick="addMember()" style="padding:0 20px; border-radius:12px; background:var(--accent2); border:none; color:black; font-weight:700;">新增</button>
    </div>
    <div id="memberList" style="background:var(--card); padding:20px; border-radius:12px; min-height:100px;"></div>
  </div>
  <button class="btn-save" onclick="saveEvent()">確認發布活動</button>
</div>
<script src="pc_auth.js"></script>
<script>
  let tempMembers = [];
  function toggleMode() {
    const mode = document.getElementById('mode').value;
    document.getElementById('amountLabel').innerText = mode === 'fixed' ? '每人應繳金額' : '活動總預算 (系統將自動分攤)';
  }
  // Date logic
  const y = document.getElementById('year'), m = document.getElementById('month'), d = document.getElementById('day');
  for(let i=2025;i<=2030;i++) y.add(new Option(i,i));
  for(let i=1;i<=12;i++) m.add(new Option(i,i));
  function updateDays() {
    d.innerHTML = '';
    const days = new Date(y.value, m.value, 0).getDate();
    for(let i=1;i<=days;i++) d.add(new Option(i,i));
  }
  y.onchange = m.onchange = updateDays; updateDays();

  function addMember() {
    const name = document.getElementById('memName').value.trim();
    const type = document.getElementById('memType').value;
    if(!name) return;
    tempMembers.push({name, type, status:'pending'});
    document.getElementById('memName').value = '';
    renderMembers();
  }
  function renderMembers() {
    document.getElementById('memberList').innerHTML = tempMembers.map((m,i) => `
      <div class="member-item" style="border-color:${m.type==='admin'?'var(--muted)':'var(--accent)'}">
        ${m.name} (${m.type==='admin'?'管理':'繳費'})
        <span onclick="tempMembers.splice(${i},1);renderMembers()" style="margin-left:8px; cursor:pointer">✕</span>
      </div>
    `).join('');
  }
  function saveEvent() {
    const title = document.getElementById('title').value;
    let amt = parseInt(document.getElementById('amount').value);
    const mode = document.getElementById('mode').value;
    if(mode==='total') {
      const payers = tempMembers.filter(m=>m.type==='payer').length;
      amt = payers > 0 ? Math.ceil(amt/payers) : 0;
    }
    const evts = PC_getEvents();
    evts.unshift({
      id: 'e'+Date.now(),
      title, amount: amt,
      deadline: `${y.value}-${m.value}-${d.value}`,
      members: tempMembers,
      status: 'active'
    });
    PC_saveEvents(evts);
    location.href = 'dashboard.html';
  }
</script>
</body>
</html>
