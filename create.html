<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>建立活動 — PayClub</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css"><script src="pc_auth.js"></script>
<style>
body{display:flex;}
.content{max-width:680px;width:100%;} .form-card{max-width:620px;} .btn-row{max-width:620px;}
.steps{display:flex;align-items:center;margin-bottom:28px;width:100%;}
.step-item{display:flex;align-items:center;gap:7px;}
.step-circle{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;color:var(--text3);transition:all 0.25s;flex-shrink:0;}
.step-item.active .step-circle{border-color:var(--accent);background:var(--accent);color:#fff;}
.step-item.done .step-circle{border-color:var(--green);background:var(--green);color:#fff;}
.step-line{flex:1;height:2px;background:var(--border);margin:0 12px;}
.step-line.done{background:var(--green);}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:32px;box-shadow:var(--shadow-md);margin-bottom:24px;}
.form-group{margin-bottom:20px;}
.form-label{display:block;font-size:0.82rem;font-weight:700;color:var(--text2);margin-bottom:8px;}
.form-input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:0.95rem;transition:all 0.2s;outline:none;}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light);}
.btn-row{display:flex;justify-content:flex-end;gap:12px;margin-top:32px;}
</style>
</head>
<body>

<div class="mobile-overlay" id="mobileOverlay" onclick="closeSidebar()"></div>
<nav class="mobile-nav">
  <div class="mobile-nav-logo"><span style="width:7px;height:7px;background:var(--accent);border-radius:50%;display:inline-block;margin-right:4px"></span>PayClub</div>
  <button class="hamburger" onclick="openSidebar()">☰</button>
</nav>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><div class="logo-dot"></div>PayClub</div>
  <nav class="sidebar-nav">
    <a class="nav-item" href="dashboard.html"><span class="icon">🏠</span>總覽</a>
    <a class="nav-item active" href="create.html"><span class="icon">➕</span>建立活動</a>
    <a class="nav-item" href="member.html"><span class="icon">🤝</span>加入活動</a>
    <a class="nav-item" href="report.html"><span class="icon">📊</span>財務報表</a>
    <div class="nav-section">我的活動</div>
    <div id="sidebarEvents"></div>
    <a class="nav-item" href="index.html"><span class="icon">🌐</span>首頁</a>
    <a class="nav-item" href="notifications.html" style="position:relative">
      <span class="icon">🔔</span>通知<span class="badge-notify" id="notifBadge" style="display:none">0</span>
    </a>
  </nav>
  <div class="sidebar-bottom">
    <div class="user-card">
      <div class="avatar" id="avatarInitial">?</div>
      <div class="user-info">
        <div class="user-name" id="userName">載入中</div>
        <div class="user-role" id="userEmail" style="font-size:0.6rem;opacity:0.8">...</div>
      </div>
      <button class="logout-btn" onclick="PC_logout()">登出</button>
    </div>
  </div>
</aside>

<main class="main">
  <div class="content">
    <div class="steps">
      <div id="si1" class="step-item active"><div class="step-circle">1</div><span style="font-size:0.85rem;font-weight:600">基本資訊</span></div>
      <div id="sl1" class="step-line"></div>
      <div id="si2" class="step-item"><div class="step-circle">2</div><span style="font-size:0.85rem;font-weight:600">金額設定</span></div>
      <div id="sl2" class="step-line"></div>
      <div id="si3" class="step-item"><div class="step-circle">3</div><span style="font-size:0.85rem;font-weight:600">確認預覽</span></div>
    </div>

    <div id="s1" class="card">
      <h2 style="margin-bottom:20px;">建立新活動</h2>
      <div class="form-group">
        <label class="form-label">活動名稱</label>
        <input type="text" id="s1Title" class="form-input" placeholder="例如：12月系學會聚餐">
      </div>
      <div class="form-group">
        <label class="form-label">截止日期</label>
        <div style="display:flex;gap:8px;">
          <select id="dlYear" class="form-input" style="flex:2"></select>
          <select id="dlMonth" class="form-input" style="flex:1"></select>
          <select id="dlDay" class="form-input" style="flex:1"></select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">活動說明 (選填)</label>
        <textarea id="s1Desc" class="form-input" style="min-height:80px;resize:none;" placeholder="簡單介紹活動內容..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">自動催款提醒</label>
        <div class="chips">
          <div class="chip selected" onclick="this.classList.toggle('selected')">截止前 7 天</div>
          <div class="chip selected" onclick="this.classList.toggle('selected')">截止前 3 天</div>
          <div class="chip selected" onclick="this.classList.toggle('selected')">截止前 1 天</div>
          <div class="chip" onclick="this.classList.toggle('selected')">截止當天</div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="goStep(2)">下一步</button>
      </div>
    </div>

    <div id="s2" style="display:none">
    <div class="form-card">
      <div class="form-card-title">👥 預先邀請成員（選填）</div>
      <div class="info-note">💡 預先邀請的成員會收到通知確認是否加入。確認前狀態為「未加入」。繳費者也可透過邀請碼自行申請。</div>
      <div class="member-add-row">
        <div>
          <input type="email" id="addEmail" class="form-input" placeholder="member@email.com" onkeydown="if(event.key==='Enter')addMember()" style="margin-bottom:8px">
          <div style="font-size:0.78rem;font-weight:600;color:var(--text2);margin-bottom:6px">選擇在此活動的角色（可多選）</div>
          <div class="role-chips" id="roleChipsInput">
            <div class="role-chip" data-role="payer" onclick="toggleRoleChip(this)">💳 繳費者</div>
            <div class="role-chip" data-role="counter" onclick="toggleRoleChip(this)">📊 統計者</div>
            <div class="role-chip" data-role="admin" onclick="toggleRoleChip(this)">👑 管理員</div>
          </div>
        </div>
        <button class="btn btn-primary" onclick="addMember()" style="align-self:flex-start;white-space:nowrap">＋ 新增</button>
      </div>
      <div class="member-list" id="memberList">
        <div style="text-align:center;padding:16px;color:var(--text3);font-size:0.84rem">尚未預先邀請成員</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="goStep(1)">← 上一步</button>
      <button class="btn btn-primary" style="flex:1;justify-content:center" onclick="goStep3()">下一步：確認建立 →</button>
    </div>
  </div>

  <div id="s3" style="display:none">
    <div class="form-card">
      <div class="form-card-title">✅ 確認活動資訊</div>
      <div class="preview-grid" id="previewInfo"></div>
      <div style="font-size:0.78rem;font-weight:700;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.04em">預先邀請成員</div>
      <table class="prev-table"><thead><tr><th>Email</th><th>角色</th></tr></thead><tbody id="previewMembers"></tbody></table>
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="goStep(2)">← 上一步</button>
      <button class="btn btn-primary" style="flex:1;justify-content:center" onclick="submitCreate()">🚀 建立活動</button>
    </div>
  </div>

  <div id="sSuccess" style="display:none">
    <div class="success-box">
      <div style="font-size:2.2rem;margin-bottom:10px">🎉</div>
      <div style="font-family:'Plus Jakarta Sans',sans-serif;font-size:1.3rem;font-weight:800;margin-bottom:6px;color:var(--green)">活動建立成功！</div>
      <div style="font-size:0.88rem;color:var(--text2);margin-bottom:4px">已通知預先邀請的成員確認加入</div>
      <div class="invite-display" onclick="copyInviteCode()">
        <div class="invite-code-big" id="inviteCodeDisp">——</div>
        <div style="font-size:0.75rem;color:var(--text2);margin-top:5px">📋 點擊複製邀請碼</div>
      </div>
      <div style="font-size:0.78rem;color:var(--text2);margin-bottom:4px">或分享收款連結</div>
      <div class="link-box">
        <div class="link-url" id="generatedLink">—</div>
        <button class="copy-sm" onclick="copyLink()">複製</button>
      </div>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:12px">
        <button class="btn btn-ghost" onclick="location.href='dashboard.html'">回總覽</button>
        <button class="btn btn-primary" onclick="goToEvent()">查看活動 →</button>
      </div>
    </div>
  </div>
  </div>
</main>

<script>
// 初始化
window.onload = () => {
  if (!PC_isLoggedIn()) {
    location.href = 'login.html';
    return;
  }
  const user = PC_getUser();

  // 1. 渲染使用者資訊 (完全同步 Dashboard)
  const uName = user.name || user.email || '使用者';
  const nameEl = document.getElementById('userName');
  const emailEl = document.getElementById('userEmail');
  const avatarEl = document.getElementById('avatarInitial');
  
  if (nameEl) nameEl.textContent = uName;
  if (emailEl) emailEl.textContent = user.email || '';
  if (avatarEl) avatarEl.textContent = uName.slice(0, 1).toUpperCase();

  // 2. 初始化側邊欄
  renderSidebar();
};

function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('mobileOverlay').classList.add('show');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('mobileOverlay').classList.remove('show');}
function toggleSideMenu(id){document.getElementById(id).classList.toggle('open');document.getElementById(id+'_icon').classList.toggle('open');}

function renderSidebar(){
  const evts=PC_getAllMyEvents();
  const created=evts.filter(e=>e._isOwner),joined=evts.filter(e=>!e._isOwner);
  let html='';
  html+=`<div class="sidebar-menu-header" onclick="toggleSideMenu('mc')">已建立活動 <span class="chevron open" id="mc_icon">▼</span></div><div class="sidebar-menu-list open" id="mc">`;
  if(!created.length)html+=`<div style="padding:4px 12px;font-size:0.74rem;color:var(--text3)">無資料</div>`;
  html+=created.map(e=>`<a class="nav-event" href="event.html?id=${e.id}"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${e.title}</span></a>`).join('')+'</div>';
  html+=`<div class="sidebar-menu-header" onclick="toggleSideMenu('mj')">已加入活動 <span class="chevron open" id="mj_icon">▼</span></div><div class="sidebar-menu-list open" id="mj">`;
  if(!joined.length)html+=`<div style="padding:4px 12px;font-size:0.74rem;color:var(--text3)">無資料</div>`;
  html+=joined.map(e=>`<a class="nav-event" href="event.html?id=${e.id}"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${e.title}</span></a>`).join('')+'</div>';
  const c=document.getElementById('sidebarEvents');if(c)c.innerHTML=html;
}

const yS=document.getElementById('dlYear'), mS=document.getElementById('dlMonth'), dS=document.getElementById('dlDay');
const now=new Date();
for(let i=0; i<3; i++) yS.add(new Option(now.getFullYear()+i, now.getFullYear()+i));
for(let i=1; i<=12; i++) mS.add(new Option(i, i));
for(let i=1; i<=31; i++) dS.add(new Option(i, i));

let amtMode = 'fixed';

function goStep(n){
  [1,2,3].forEach(i=>{
    document.getElementById('s'+i).style.display = (i===n)?'block':'none';
    document.getElementById('si'+i).className = (i<n)?'step-item done':(i===n)?'step-item active':'step-item';
    const line = document.getElementById('sl'+i);
    if(line) line.className = (i<n)?'step-line done':'step-line';
  });
}

function setMode(m){
  amtMode=m;
  document.getElementById('m1').className = m==='fixed'?'role-option active':'role-option';
  document.getElementById('m2').className = m==='custom'?'role-option active':'role-option';
  document.getElementById('fixedInput').style.display = m==='fixed'?'block':'none';
}

function preview(){
  const title = document.getElementById('s1Title').value.trim();
  if(!title){ PC_toast('請輸入名稱'); return; }
  document.getElementById('pTitle').textContent = title;
  document.getElementById('pDl').textContent = `${yS.value}-${mS.value}-${dS.value}`;
  document.getElementById('pMode').textContent = amtMode==='fixed'?'固定':'彈性';
  document.getElementById('pAmt').textContent = '$'+(document.getElementById('fixedAmt').value||0);
  goStep(3);
}

const ROLE_SEL={payer:'sel-payer',counter:'sel-counter',admin:'sel-admin'};const ROLE_LABELS={payer:'繳費者',counter:'統計者',admin:'管理員'};const ROLE_BADGE={payer:'badge-blue',counter:'badge-orange',admin:'badge-green'};function toggleRoleChip(el){const cls=ROLE_SEL[el.dataset.role]; if(cls)el.classList.toggle(cls);}function getSelectedRoles(){return Array.from(document.querySelectorAll('#roleChipsInput .role-chip')).filter(el=>Object.values(ROLE_SEL).some(c=>el.classList.contains(c))).map(el=>el.dataset.role);}let members=[];function addMember(){
  const email=document.getElementById('addEmail').value.trim(); const roles=getSelectedRoles();
  if(!email||!email.includes('@')){PC_toast('請輸入有效 Email'); return;}
  if(!roles.length){PC_toast('請至少選擇一個角色'); return;}
  if(members.find(m=>m.email===email)){PC_toast('此 Email 已新增'); return;}
  members.push({email, name:email.split('@')[0], roles, role:roles[0]});
  document.getElementById('addEmail').value='';
  document.querySelectorAll('#roleChipsInput .role-chip').forEach(el=>{Object.values(ROLE_SEL).forEach(c=>el.classList.remove(c));});
  renderMemberList();
}function removeMember(i){members.splice(i,1); renderMemberList();}function renderMemberList(){
  const list=document.getElementById('memberList');
  if(!members.length){list.innerHTML='<div style="text-align:center;padding:16px;color:var(--text3);font-size:0.84rem">尚未預先邀請成員</div>';return;}
  list.innerHTML=members.map((m,i)=>`<div class="member-tag"><div class="member-tag-left"><div class="m-av-sm">${m.email.slice(0,1).toUpperCase()}</div><div class="m-email-text">${m.email}</div>${m.roles.map(r=>`<span class="badge ${ROLE_BADGE[r]}" style="font-size:0.68rem">${ROLE_LABELS[r]}</span>`).join('')}<span class="badge badge-orange" style="font-size:0.68rem">未加入</span></div><button class="m-remove" onclick="removeMember(${i})">✕</button></div>`).join('');
}

let createdId=null, createdCode='';function submitCreate(){
  const title=document.getElementById('s1Title').value.trim();
  const y=yS.value, mo=mS.value.padStart(2,'0'), d=dS.value.padStart(2,'0');
  const dl=`${y}-${mo}-${d}`; const desc=document.getElementById('s1Desc').value.trim();
  const code=PC_genInviteCode(); createdId='e'+Date.now(); createdCode=code;
  const memberList=members.map(m=>({email:m.email, name:m.name, roles:m.roles, role:m.roles[0], status:'pending_invite', paidAt:'', customAmount:null, txId:'', remark:'', payMethod:'', txHistory:[]}));
  const newEvt={id:createdId, title, ownerEmail:PC_getUser().email, amountMode:'per_person', amount:0, deadline:dl, desc, status:'active', inviteCode:code, members:memberList};
  const evts=PC_getEvents(); evts.unshift(newEvt); PC_saveEvents(evts);
  memberList.forEach(m=>{PC_sendNotify(m.email,'活動邀請確認 🎫',`「${title}」管理員邀請你加入。`,'invite');});
  document.getElementById('inviteCodeDisp').textContent=code;
  const link=location.href.replace('create.html','pay.html')+'?event='+createdId;
  document.getElementById('generatedLink').textContent=link;
  [1,2,3].forEach(i=>document.getElementById('s'+i).style.display='none');
  document.getElementById('sSuccess').style.display='block'; renderSidebar();
}function copyInviteCode(){PC_copyText(createdCode,'🔑 邀請碼已複製：'+createdCode);}function copyLink(){PC_copyText(document.getElementById('generatedLink').textContent,'🔗 連結已複製');}function goToEvent(){location.href='event.html?id='+createdId;}
</script>
</body>
</html>
