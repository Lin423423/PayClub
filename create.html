<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>建立活動 — PayClub</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css"><script src="pc_auth.js"></script>
<style>
body{display:flex;}
.content{max-width:680px;width:100%;}
.steps{display:flex;align-items:center;margin-bottom:28px;}
.step-item{display:flex;align-items:center;gap:7px;}
.step-circle{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;color:var(--text3);flex-shrink:0;}
.step-item.active .step-circle{border-color:var(--accent);background:var(--accent);color:#fff;}
.step-item.done .step-circle{border-color:var(--green);background:var(--green);color:#fff;}
.step-line{flex:1;height:2px;background:var(--border);margin:0 12px;}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:32px;box-shadow:var(--shadow-md);margin-bottom:24px;}
.form-input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:0.95rem;outline:none;margin-top:8px;}
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><div class="logo-dot"></div>PayClub</div>
  <nav class="sidebar-nav">
    <a class="nav-item" href="dashboard.html"><span class="icon">🏠</span>總覽</a>
    <a class="nav-item active" href="create.html"><span class="icon">➕</span>建立活動</a>
    <a class="nav-item" href="member.html"><span class="icon">🤝</span>加入活動</a>
    <a class="nav-item" href="report.html"><span class="icon">📊</span>財務報表</a>
    <div class="nav-section">我的活動</div>
    <div id="sidebarEvents"></div>
  </nav>
</aside>

<main class="main">
  <div class="content">
    <div class="steps">
        <div id="si1" class="step-item active"><div class="step-circle">1</div><span>基本資訊</span></div>
        <div class="step-line"></div>
        <div id="si2" class="step-item"><div class="step-circle">2</div><span>收費設定</span></div>
    </div>

    <div id="s1" class="card">
      <h2 style="margin-bottom:20px;">建立活動</h2>
      <div class="form-group"><label class="form-label">活動名稱</label><input type="text" id="s1Title" class="form-input"></div>
      <div class="form-group" style="margin-top:15px;"><label class="form-label">截止日期</label><input type="date" id="s1Date" class="form-input"></div>
      <div style="display:flex; justify-content:flex-end; margin-top:20px;"><button class="btn btn-primary" onclick="goStep(2)">下一步</button></div>
    </div>

    <div id="s2" class="card" style="display:none;">
      <h2 style="margin-bottom:20px;">收費金額</h2>
      <div class="form-group"><label class="form-label">每人應收 (TWD)</label><input type="number" id="s2Amt" class="form-input" value="0"></div>
      <div style="display:flex; justify-content:space-between; margin-top:20px;">
        <button class="btn btn-ghost" onclick="goStep(1)">上一步</button>
        <button class="btn btn-primary" onclick="submitCreate()">完成並建立</button>
      </div>
    </div>
  </div>
</main>

<script>
const user = PC_requireLogin();
function goStep(n){
    document.getElementById('s1').style.display = n===1?'block':'none';
    document.getElementById('s2').style.display = n===2?'block':'none';
    document.getElementById('si2').className = n===2?'step-item active':'step-item';
}

function submitCreate(){
    const title = document.getElementById('s1Title').value.trim();
    if(!title) return PC_toast('請輸入名稱');
    const newEvt = {
        id: 'e' + Date.now(),
        title: title,
        ownerEmail: user.email,
        amount: document.getElementById('s2Amt').value || 0,
        deadline: document.getElementById('s1Date').value || PC_nowStr().split(' ')[0],
        status: 'active',
        members: []
    };
    const evts = PC_getEvents();
    evts.unshift(newEvt);
    PC_saveEvents(evts);
    location.href = 'event.html?id=' + newEvt.id;
}

function toggleSideMenu(id){document.getElementById(id).classList.toggle('open');}
function renderSidebar(){
  const evts=PC_getAllMyEvents();
  document.getElementById('sidebarEvents').innerHTML = evts.filter(e=>e._isOwner).map(e=>`<a class="nav-event" href="event.html?id=${e.id}"><span>${e.title}</span></a>`).join('');
  PC_fillSidebarUser();
}
renderSidebar();
</script>
</body>
</html>
