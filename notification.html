<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>通知中心 — PayClub</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css"><script src="pc_auth.js"></script>
<style>
body{display:flex;}
.content-wrap{max-width:760px;width:100%;margin:0 auto;}
.notif-list{display:flex;flex-direction:column;gap:12px;margin-top:20px;}
.notif-card{display:flex;gap:14px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:18px;cursor:pointer;transition:all 0.15s;position:relative;box-shadow:var(--shadow);}
.notif-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 14px rgba(79,110,247,0.08);}
.notif-card.read{background:var(--surface);opacity:0.8;box-shadow:none;}
.notif-card.read:hover{border-color:var(--border2);transform:none;}
.notif-icon{width:42px;height:42px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
.notif-card.read .notif-icon{background:var(--border);filter:grayscale(1);}
.notif-content{flex:1;}
.notif-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:0.95rem;font-weight:700;margin-bottom:6px;color:var(--text);}
.notif-card.unread .notif-title{color:var(--accent);}
.notif-desc{font-size:0.86rem;color:var(--text2);line-height:1.5;margin-bottom:8px;}
.notif-time{font-size:0.72rem;color:var(--text3);}
.unread-dot{width:10px;height:10px;background:var(--red);border-radius:50%;position:absolute;top:24px;right:20px;box-shadow:0 0 0 3px var(--white);}
.empty-state{text-align:center;padding:60px 20px;color:var(--text2);}
</style>
</head>
<body>
<div class="mobile-overlay" id="mobileOverlay" onclick="closeSidebar()"></div>
<nav class="mobile-nav">
  <div class="mobile-nav-logo"><span style="width:7px;height:7px;background:var(--accent);border-radius:50%;display:inline-block;margin-right:4px"></span>PayClub</div>
  <button class="hamburger" onclick="openSidebar()">☰</button>
</nav>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><div class="logo-dot"></div>PayClub</div>
  <nav class="sidebar-nav">
    <a class="nav-item" href="dashboard.html"><span class="icon">🏠</span>總覽</a>
    <a class="nav-item" href="create.html"><span class="icon">➕</span>建立活動</a>
    <a class="nav-item" href="member.html"><span class="icon">🤝</span>加入活動</a>
    <a class="nav-item" href="report.html"><span class="icon">📊</span>財務報表</a>
    <div class="nav-section">我的活動</div>
    <div id="sidebarEvents"></div>
    <a class="nav-item" href="index.html"><span class="icon">🌐</span>首頁</a>
    <a class="nav-item active" href="notifications.html" style="position:relative">
      <span class="icon">🔔</span>通知
      <span class="badge-notify" id="notifBadge" style="display:none">0</span>
    </a>
  </nav>
  <div class="sidebar-bottom">
    <div class="user-card">
      <div class="avatar" id="avatarInitial">?</div>
      <div class="user-info">
        <div class="user-name" id="userName">載入中</div>
        <div class="user-role" id="userEmail" style="font-size:0.6rem; opacity:0.8">email...</div>
      </div>
      <button class="logout-btn" onclick="PC_logout()">登出</button>
    </div>
  </div>
</aside>

<main class="main">
  <div class="content-wrap">
    <div class="topbar">
      <div>
        <div class="page-title">通知中心</div>
        <div class="page-sub">查看所有活動相關的最新消息與審核結果</div>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-ghost" onclick="markAllRead()">✓ 全部標示為已讀</button>
        <button class="btn btn-danger" onclick="clearAll()">🗑 清空紀錄</button>
      </div>
    </div>
    
    <div class="notif-list" id="notifList">
      </div>
  </div>
</main>
<div class="toast" id="toast"></div>

<script>
// 驗證登入狀態
const user = PC_requireLogin(); if(!user) throw new Error('r');
PC_fillSidebarUser();

function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('mobileOverlay').classList.add('show');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('mobileOverlay').classList.remove('show');}

// 渲染側邊欄活動
function renderSidebar(){
  const evts = PC_getAllMyEvents();
  document.getElementById('sidebarEvents').innerHTML = evts.map(e => {
    return `<a class="nav-event" href="${e._isOwner ? 'event.html?id='+e.id : 'member.html'}"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${e.title}</span></a>`;
  }).join('');
}

// 讀取通知資料庫
function loadNotifs() {
  const key = 'pc_notif__' + user.email;
  return JSON.parse(localStorage.getItem(key) || '[]');
}

// 儲存通知資料庫
function saveNotifs(list) {
  const key = 'pc_notif__' + user.email;
  localStorage.setItem(key, JSON.stringify(list));
  PC_fillSidebarUser(); // 更新側邊欄的小紅點
}

// 渲染通知列表
function renderNotifs() {
  const list = loadNotifs();
  const container = document.getElementById('notifList');
  
  if(list.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div style="font-size:2.5rem;opacity:0.4;margin-bottom:12px">📭</div>
        <p>目前沒有任何通知</p>
      </div>`;
    return;
  }
  
  container.innerHTML = list.map(n => {
    // 根據標題給予不同的 Emoji
    let icon = '🔔';
    if(n.title.includes('退出') || n.title.includes('移除')) icon = '👋';
    if(n.title.includes('申請') || n.title.includes('加入')) icon = '👥';
    if(n.title.includes('金額') || n.title.includes('款')) icon = '💰';
    if(n.title.includes('拒絕')) icon = '❌';
    
    const timeStr = new Date(n.time).toLocaleString('zh-TW', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
    
    return `
      <div class="notif-card ${n.read ? 'read' : 'unread'}" onclick="markRead(${n.id})">
        <div class="notif-icon">${icon}</div>
        <div class="notif-content">
          <div class="notif-title">${n.title}</div>
          <div class="notif-desc">${n.content}</div>
          <div class="notif-time">${timeStr}</div>
        </div>
        ${!n.read ? '<div class="unread-dot"></div>' : ''}
      </div>
    `;
  }).join('');
}

// 單筆標示為已讀
function markRead(id) {
  const list = loadNotifs();
  const notif = list.find(x => x.id === id);
  if(notif && !notif.read) {
    notif.read = true;
    saveNotifs(list);
    renderNotifs();
  }
}

// 全部標示為已讀
function markAllRead() {
  const list = loadNotifs();
  let changed = false;
  list.forEach(n => {
    if(!n.read) { n.read = true; changed = true; }
  });
  if(changed) {
    saveNotifs(list);
    renderNotifs();
    PC_toast('✅ 已全部標示為已讀');
  }
}

// 清空所有紀錄
function clearAll() {
  const list = loadNotifs();
  if(list.length === 0) return;
  if(!confirm('確定要清空所有通知紀錄嗎？這項操作無法復原。')) return;
  saveNotifs([]);
  renderNotifs();
  PC_toast('🗑 通知已清空');
}

renderSidebar();
renderNotifs();
</script>
</body></html>
