<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>PayClub — 校園金流管理</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  
  :root {
    --bg: #020617;
    --surface: #0f172a;
    --card: #1e293b;
    --accent: #6366f1;
    --accent2: #10b981;
    --text: #f8fafc;
    --muted: #94a3b8;
    --border: rgba(148, 163, 184, 0.1);
    --shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Plus Jakarta Sans','Noto Sans TC',sans-serif; }
  nav { display:flex; justify-content:space-between; align-items:center; padding:20px 8%; border-bottom:1px solid var(--border); }
  .logo { font-size:24px; font-weight:800; color:var(--accent); }
  .nav-btns { display:flex; gap:15px; }
  .btn { padding:10px 24px; border-radius:12px; text-decoration:none; font-weight:600; transition:0.3s; }
  .btn-outline { border:1px solid var(--accent); color:var(--accent); }
  .btn-solid { background:var(--accent); color:white; }
  .hero { padding:100px 8%; text-align:center; }
  .hero h1 { font-size:56px; margin-bottom:20px; }
</style>
</head>
<body>
<nav>
  <div class="logo">PayClub</div>
  <div class="nav-btns" id="navAction">
    <a href="login.html" class="btn btn-outline">登入</a>
    <a href="login.html?mode=register" class="btn btn-solid">免費開始</a>
  </div>
</nav>
<section class="hero">
  <h1>更聰明的校園收款方式</h1>
  <p>專為社團設計，讓財務管理變得簡單透明。</p>
</section>
<script src="pc_auth.js"></script>
<script>
  const user = PC_getUser();
  if(user) {
    document.getElementById('navAction').innerHTML = '<a href="dashboard.html" class="btn btn-solid">進入儀表板</a>';
  }
</script>
</body>
</html>
