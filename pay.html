<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>線上繳費 — PayClub</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  
  :root {
    --bg: #020617;
    --surface: #0f172a;
    --card: #1e293b;
    --accent: #6366f1;
    --accent2: #10b981;
    --text: #f8fafc;
    --muted: #94a3b8;
    --border: rgba(148, 163, 184, 0.1);
    --shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Plus Jakarta Sans','Noto Sans TC',sans-serif; min-height:100vh; display:flex; flex-direction:column; }
  .header { padding:20px 8%; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:20px; }
  .btn-back { width:40px; height:40px; border-radius:50%; background:var(--card); display:flex; align-items:center; justify-content:center; text-decoration:none; color:white; border:1px solid var(--border); }
  .pay-container { flex:1; display:flex; padding:40px 8%; gap:40px; }
  .event-info { flex:4; background:var(--surface); padding:40px; border-radius:24px; border:1px solid var(--border); }
  .pay-form { flex:6; background:var(--card); padding:40px; border-radius:24px; border:1px solid var(--accent); box-shadow:var(--shadow); }
  @media (max-width: 900px) { .pay-container { flex-direction:column; } }
  input { width:100%; padding:15px; background:var(--bg); border:1px solid var(--border); border-radius:12px; color:white; margin-top:10px; }
  .btn-pay { width:100%; background:var(--accent2); color:black; font-weight:800; padding:18px; border-radius:12px; border:none; margin-top:30px; cursor:pointer; }
</style>
</head>
<body>
<div class="header">
  <a href="javascript:history.back()" class="btn-back">←</a>
  <div style="font-weight:800; font-size:20px;">PayClub 收款頁面</div>
</div>
<div class="pay-container">
  <div class="event-info">
    <h1 id="evtTitle">載入中...</h1>
    <p id="evtDesc" style="color:var(--muted); margin-top:15px; line-height:1.6;"></p>
    <div style="margin-top:40px;">
      <div class="label">應繳總額</div>
      <div id="evtAmt" style="font-size:48px; font-weight:800; color:var(--accent2);">$0</div>
    </div>
  </div>
  <div class="pay-form">
    <h2>填寫繳費資訊</h2>
    <div style="margin-top:20px;">
      <label>繳費人姓名</label>
      <input id="payerName" placeholder="請輸入您的真實姓名">
    </div>
    <div style="margin-top:20px;">
      <label>支付方式</label>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;">
        <div style="padding:15px; background:var(--bg); border:1px solid var(--accent); border-radius:12px; text-align:center;">LINE Pay</div>
        <div style="padding:15px; background:var(--bg); border:1px solid var(--border); border-radius:12px; text-align:center; opacity:0.5;">信用卡</div>
      </div>
    </div>
    <button class="btn-pay" onclick="doPay()">確認支付</button>
  </div>
</div>
<script src="pc_auth.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const id = params.get('event');
  const evts = PC_getEvents();
  const e = evts.find(x=>x.id===id) || evts[0];
  
  document.getElementById('evtTitle').innerText = e.title;
  document.getElementById('evtAmt').innerText = '$' + e.amount;
  document.getElementById('evtDesc').innerText = e.desc || '請確認金額後進行支付。';

  function doPay() {
    const name = document.getElementById('payerName').value;
    if(!name) return alert('請輸入姓名');
    const target = e.members.find(m=>m.name===name);
    if(target) { target.status = 'paid'; target.paidAt = PC_nowStr(); }
    else { e.members.push({name, status:'paid', type:'payer', paidAt: PC_nowStr()}); }
    PC_saveEvents(evts);
    alert('支付成功！');
    location.href = 'dashboard.html';
  }
</script>
</body>
</html>
