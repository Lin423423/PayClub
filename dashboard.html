<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>儀表板 — PayClub</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  
  :root {
    --bg: #020617;
    --surface: #0f172a;
    --card: #1e293b;
    --accent: #6366f1;
    --accent2: #10b981;
    --text: #f8fafc;
    --muted: #94a3b8;
    --border: rgba(148, 163, 184, 0.1);
    --shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Plus Jakarta Sans','Noto Sans TC',sans-serif; display:flex; }
  .sidebar { width:260px; background:var(--surface); height:100vh; position:fixed; border-right:1px solid var(--border); padding:30px 20px; }
  .main { margin-left:260px; flex:1; padding:40px; }
  .bento-grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:20px; margin-bottom:40px; }
  .bento-item { background:var(--card); padding:24px; border-radius:20px; border:1px solid var(--border); }
  .event-card { background:var(--card); padding:20px; border-radius:16px; border:1px solid var(--border); margin-bottom:15px; }
  .amount-box { display:flex; justify-content:space-between; margin-top:15px; padding-top:15px; border-top:1px solid var(--border); }
  .label { color:var(--muted); font-size:13px; }
  .val { font-weight:700; color:var(--accent2); }
  .btn-create { display:block; background:var(--accent); color:white; padding:12px; border-radius:12px; text-align:center; text-decoration:none; margin-top:20px; }
</style>
</head>
<body>
<div class="sidebar">
  <div style="font-size:22px; font-weight:800; color:var(--accent); margin-bottom:40px;">PayClub</div>
  <a href="dashboard.html" style="color:var(--text); text-decoration:none; display:block; margin-bottom:20px;">🏠 儀表板</a>
  <a href="create.html" class="btn-create">➕ 建立活動</a>
  <a href="index.html" style="color:var(--muted); text-decoration:none; display:block; margin-top:40px;">⇠ 回首頁</a>
</div>
<div class="main">
  <h1>社團概況</h1>
  <div class="bento-grid">
    <div class="bento-item"><div class="label">總實收金額</div><div style="font-size:28px; font-weight:800; margin-top:10px;">$42,500</div></div>
    <div class="bento-item"><div class="label">活動總數</div><div style="font-size:28px; font-weight:800; margin-top:10px;">8</div></div>
    <div class="bento-item"><div class="label">繳費達成率</div><div style="font-size:28px; font-weight:800; margin-top:10px; color:var(--accent2);">92%</div></div>
  </div>
  <h2>所有活動</h2>
  <div id="eventList"></div>
</div>
<script src="pc_auth.js"></script>
<script>
  function render() {
    const evts = PC_getEvents();
    const list = document.getElementById('eventList');
    list.innerHTML = evts.map(e => {
      const paidNum = e.members.filter(m => m.status === 'paid' && m.type !== 'admin').length;
      const payers = e.members.filter(m => m.type !== 'admin').length;
      const totalExpected = payers * e.amount;
      const totalActual = paidNum * e.amount;
      return `
        <div class="event-card">
          <div style="display:flex; justify-content:space-between;">
            <h3>${e.title}</h3>
            <span class="label">截止日: ${e.deadline}</span>
          </div>
          <div class="amount-box">
            <div><div class="label">應收總額</div><div style="color:var(--text)">$${totalExpected.toLocaleString()}</div></div>
            <div><div class="label">實收總額</div><div class="val">$${totalActual.toLocaleString()}</div></div>
            <div><div class="label">繳費人數</div><div>${paidNum} / ${payers}</div></div>
          </div>
        </div>
      `;
    }).join('');
  }
  render();
</script>
</body>
</html>
