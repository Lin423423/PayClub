<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的活動 — PayClub</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css"><script src="pc_auth.js"></script>
<style>
body{background:var(--bg);min-height:100vh;}
.member-nav{background:var(--white);border-bottom:1px solid var(--border);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--shadow);}
.nav-logo{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:1.15rem;color:var(--accent);display:flex;align-items:center;gap:7px;}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-avatar{width:30px;height:30px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;}
.nav-name{font-size:0.86rem;font-weight:600;}
.content{max-width:720px;margin:0 auto;padding:28px 20px;}
.invite-section{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:22px;}
.invite-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:1rem;font-weight:800;margin-bottom:5px;}
.invite-sub{color:var(--text2);font-size:0.84rem;margin-bottom:16px;line-height:1.6;}
.invite-row{display:flex;gap:10px;}
.invite-input{flex:1;background:var(--white);border:1.5px solid var(--border);border-radius:9px;padding:11px 16px;font-size:0.95rem;font-family:'Noto Sans TC',sans-serif;color:var(--text);outline:none;letter-spacing:0.1em;text-transform:uppercase;font-weight:700;}
.invite-input:focus{border-color:var(--accent);}
.invite-input::placeholder{letter-spacing:0;font-weight:400;text-transform:none;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.section-title{font-size:0.9rem;font-weight:700;}
.event-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;box-shadow:var(--shadow);overflow:hidden;}
.ec-main{padding:18px 20px;cursor:pointer;transition:background 0.15s;}
.ec-main:hover{background:var(--surface);}
.ec-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.ec-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:1rem;font-weight:700;}
.ec-badges{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.ec-meta{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px;}
.ec-meta span{font-size:0.78rem;color:var(--text2);}
.ec-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.sum-box{background:var(--surface);border-radius:8px;padding:10px 12px;text-align:center;}
.sum-label{font-size:0.68rem;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:3px;}
.sum-val{font-family:'Plus Jakarta Sans',sans-serif;font-size:1rem;font-weight:700;}
/* Detail panel */
.ec-detail{border-top:1px solid var(--border);padding:16px 20px;display:none;}
.ec-detail.open{display:block;}
/* Status box */
.my-status-box{background:var(--accent-light);border:1px solid #c7d2fe;border-radius:10px;padding:14px 16px;margin-bottom:14px;}
.my-status-label{font-size:0.72rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;}
.my-status-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.tx-info{background:var(--surface);border-radius:8px;padding:10px 14px;margin-top:10px;font-size:0.78rem;color:var(--text2);}
.tx-info strong{color:var(--text);font-weight:700;}
/* Member table */
.member-table{width:100%;border-collapse:collapse;font-size:0.83rem;margin-bottom:12px;}
.member-table th{background:var(--surface);padding:8px 10px;text-align:left;font-size:0.7rem;color:var(--text2);font-weight:700;text-transform:uppercase;}
.member-table td{padding:9px 10px;border-bottom:1px solid var(--border);}
.member-table tr:last-child td{border-bottom:none;}
/* Observer stats */
.obs-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.obs-box{background:var(--surface);border-radius:9px;padding:12px 14px;}
.obs-label{font-size:0.68rem;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:4px;}
.obs-val{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.1rem;font-weight:700;}
.pay-btn{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:9px;font-size:0.9rem;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;margin-bottom:4px;}
.pay-btn:hover{background:var(--accent-dark);}
.pay-btn:disabled{background:var(--green);cursor:default;}
.ec-footer{padding:10px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;}
.leave-btn{background:none;border:none;color:var(--text3);font-size:0.76rem;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.leave-btn:hover{color:var(--red);}
/* Pending/rejected states */
.pending-box{background:var(--orange-light);border-radius:9px;padding:12px 14px;font-size:0.84rem;color:var(--orange);}
.rejected-box{background:var(--red-light);border-radius:9px;padding:12px 14px;font-size:0.84rem;color:var(--red);}
.empty-state{text-align:center;padding:40px 20px;color:var(--text2);}
@media(max-width:480px){.ec-summary{grid-template-columns:1fr 1fr;}.invite-row{flex-direction:column;}.obs-stats{grid-template-columns:1fr;}}
</style>
</head>
<body>
<nav class="member-nav">
  <div class="nav-logo"><div style="width:7px;height:7px;background:var(--accent);border-radius:50%;display:inline-block;margin-right:2px"></div>PayClub</div>
  <div class="nav-right">
    <div class="nav-avatar" id="navAvatar">M</div>
    <div class="nav-name" id="navName">載入中</div>
    <button class="logout-btn" onclick="PC_logout()">登出</button>
  </div>
</nav>
<div class="content">
  <div class="invite-section">
    <div class="invite-title">🔑 輸入活動邀請碼</div>
    <div class="invite-sub">向活動管理員索取 8 位邀請碼，輸入後送出申請，管理員審核通過後即可查看活動內容。</div>
    <div class="invite-row">
      <input type="text" id="inviteInput" class="invite-input" placeholder="例：ABC12345" maxlength="8" oninput="this.value=this.value.toUpperCase()">
      <button class="btn btn-primary" onclick="joinEvent()">加入活動</button>
    </div>
    <div id="inviteErr" style="color:var(--red);font-size:0.78rem;margin-top:8px;display:none;"></div>
  </div>

  <div class="section-header">
    <div class="section-title" id="joinedTitle" style="display:none">我加入的活動</div>
    <button class="btn btn-ghost" onclick="refreshAll()" style="font-size:0.8rem;padding:6px 12px;" id="refreshBtn" style="display:none">🔄 更新狀態</button>
  </div>
  <div id="joinedEvents"></div>
  <div class="empty-state" id="emptyState">
    <div style="font-size:2.5rem;margin-bottom:12px;opacity:0.4">🎫</div>
    <p>尚未加入任何活動<br>輸入邀請碼開始！</p>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const user=PC_requireLogin();if(!user)throw new Error('r');
document.getElementById('navAvatar').textContent=user.name.slice(0,1);
document.getElementById('navName').textContent=user.name;

function getMemberJoined(){ return JSON.parse(localStorage.getItem('pc_member_joined__'+user.email)||'[]'); }
function saveMemberJoined(e){ localStorage.setItem('pc_member_joined__'+user.email,JSON.stringify(e)); }

function joinEvent(){
  const code=document.getElementById('inviteInput').value.trim().toUpperCase();
  const errEl=document.getElementById('inviteErr');
  if(code.length<4){errEl.textContent='請輸入邀請碼';errEl.style.display='block';return;}
  const result=PC_findEventByCode(code);
  if(!result){errEl.textContent='找不到此邀請碼，請確認後重試';errEl.style.display='block';return;}
  errEl.style.display='none';
  const joined=getMemberJoined();
  if(joined.find(j=>j.eventId===result.event.id)){PC_toast('你已送出申請或加入此活動');return;}
  const reqs=PC_getJoinRequests(result.event.id);
  const alreadyReq=reqs.find(r=>r.email===user.email);
  if(alreadyReq){PC_toast(alreadyReq.status==='pending'?'申請已送出，等待審核':alreadyReq.status==='rejected'?'申請已被拒絕':'已加入此活動');return;}
  reqs.push({email:user.email,name:user.name,requestedAt:new Date().toISOString(),status:'pending',suggestedRole:'payer'});
  PC_saveJoinRequests(result.event.id,reqs);
  joined.push({eventId:result.event.id,eventTitle:result.event.title,ownerKey:result.ownerKey});
  saveMemberJoined(joined);
  document.getElementById('inviteInput').value='';
  PC_toast('✅ 申請已送出！等待管理員審核');
  renderJoined();
}

function refreshAll(){ renderJoined(); PC_toast('✅ 狀態已更新'); }

function renderJoined(){
  const joined=getMemberJoined();
  const emptyEl=document.getElementById('emptyState');
  const titleEl=document.getElementById('joinedTitle');
  const refreshBtn=document.getElementById('refreshBtn');
  const container=document.getElementById('joinedEvents');
  if(!joined.length){emptyEl.style.display='block';titleEl.style.display='none';refreshBtn.style.display='none';container.innerHTML='';return;}
  emptyEl.style.display='none';titleEl.style.display='block';refreshBtn.style.display='inline-flex';

  container.innerHTML=joined.map((j,ji)=>{
    const reqs=PC_getJoinRequests(j.eventId);
    const myReq=reqs.find(r=>r.email===user.email);
    const status=myReq?myReq.status:'pending';
    const approved=status==='approved';
    const rejected=status==='rejected';
    const myRole=myReq&&myReq.approvedRole?myReq.approvedRole:'payer';

    const result=PC_findEventById(j.eventId);
    const evt=result?result.event:null;
    if(!evt) return `<div class="event-card"><div class="ec-main" style="cursor:default"><div style="color:var(--text3);display:flex;justify-content:space-between;align-items:center;font-size:0.84rem;">活動「${j.eventTitle}」已被刪除<button onclick="leaveEvent(event,${ji})" style="color:var(--red);background:none;border:none;cursor:pointer;font-family:inherit;font-size:0.8rem">移除</button></div></div></div>`;

    const payers=PC_getPayers(evt);
    const paid=payers.filter(m=>m.status==='paid').length;
    const pct=payers.length?Math.round(paid/payers.length*100):0;
    const dl=new Date(evt.deadline),days=Math.ceil((dl-new Date())/86400000);

    // Status badge
    const statusBadge=!approved&&!rejected?'<span class="badge badge-orange">審核中</span>':rejected?'<span class="badge badge-red">已拒絕</span>':`<span class="badge badge-green">${ROLE_LABELS[myRole]||myRole}</span>`;

    // My member record
    const myMember=approved?(evt.members||[]).find(m=>m.email===user.email):null;
    const myStatus=myMember?(myMember.status==='paid'?'已繳費':'待繳費'):null;

    // Build detail based on role
    let detailHtml='';
    if(!approved&&!rejected){
      detailHtml=`<div class="pending-box">⏳ 申請已送出，等待管理員審核通過後即可查看活動內容。</div>`;
    } else if(rejected){
      detailHtml=`<div class="rejected-box">❌ 申請已被拒絕，請聯繫活動管理員。</div>`;
    } else if(myRole==='payer'){
      const myAmt=myMember?PC_getExpectedAmount(evt,myMember):(evt.amount||0);
      const txInfo=myMember&&myMember.txId?`<div class="tx-info"><div style="margin-bottom:4px">繳費編號：<strong>${myMember.txId}</strong></div><div>繳費時間：<strong>${myMember.paidAt}</strong></div>${myMember.remark?`<div>備註：<strong>${myMember.remark}</strong></div>`:''}</div>`:'';
      detailHtml=`
        <div class="my-status-box">
          <div class="my-status-label">我的繳費狀態</div>
          <div class="my-status-row">
            <div style="font-size:0.9rem;font-weight:700">${user.name}</div>
            <div style="display:flex;align-items:center;gap:8px;"><span style="font-weight:800;font-size:1.1rem;color:var(--accent)">$${myAmt.toLocaleString()}</span><span class="badge ${myMember&&myMember.status==='paid'?'badge-green':'badge-orange'}">${myStatus||'待確認'}</span></div>
          </div>${txInfo}
        </div>
        <div style="font-size:0.78rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px;">繳費成員名單</div>
        <table class="member-table">
          <thead><tr><th>Email</th><th>應繳</th><th>狀態</th><th>繳費編號</th></tr></thead>
          <tbody>${payers.map(m=>`<tr>
            <td>${m.email||m.name||'—'}</td>
            <td>$${PC_getExpectedAmount(evt,m).toLocaleString()}</td>
            <td><span class="badge ${m.status==='paid'?'badge-green':'badge-orange'}">${m.status==='paid'?'已繳':'待繳'}</span></td>
            <td style="font-size:0.72rem;color:var(--text3)">${m.txId||'—'}</td>
          </tr>`).join('')||'<tr><td colspan="4" style="color:var(--text3);text-align:center">尚無繳費成員</td></tr>'}</tbody>
        </table>
        ${myMember&&myMember.status!=='paid'?`<button class="pay-btn" onclick="location.href='pay.html?event=${evt.id}'">前往繳費 →</button>`:''}
        ${myMember&&myMember.status==='paid'?`<button class="pay-btn" disabled>✅ 已完成繳費</button>`:''}`;
    } else if(myRole==='observer'){
      detailHtml=`
        <div style="font-size:0.8rem;color:var(--text2);margin-bottom:10px;">👁 觀察者可查看活動總覽資訊</div>
        <div class="obs-stats">
          <div class="obs-box"><div class="obs-label">實收金額</div><div class="obs-val" style="color:var(--green)">$${PC_getCollected(evt).toLocaleString()}</div></div>
          <div class="obs-box"><div class="obs-label">應收金額</div><div class="obs-val">$${PC_getExpected(evt).toLocaleString()}</div></div>
          <div class="obs-box"><div class="obs-label">繳費率</div><div class="obs-val" style="color:var(--accent)">${pct}%</div></div>
          <div class="obs-box"><div class="obs-label">繳費進度</div><div class="obs-val">${paid}/${payers.length} 人</div></div>
        </div>`;
    }

    return `<div class="event-card">
      <div class="ec-main" onclick="toggleDetail('${j.eventId}')">
        <div class="ec-header"><div class="ec-title">${evt.title}</div><div class="ec-badges">${statusBadge}<span class="badge ${evt.status==='active'?'badge-green':'badge-gray'}">${evt.status==='active'?'進行中':'已結束'}</span></div></div>
        <div class="ec-meta"><span>📅 截止：${evt.deadline}${days>0?' (剩'+days+'天)':' (已截止)'}</span><span>👥 ${payers.length} 位繳費成員</span></div>
        <div class="ec-summary">
          <div class="sum-box"><div class="sum-label">繳費率</div><div class="sum-val" style="color:var(--accent)">${pct}%</div></div>
          <div class="sum-box"><div class="sum-label">已繳</div><div class="sum-val">${paid}/${payers.length}</div></div>
          <div class="sum-box"><div class="sum-label">截止倒數</div><div class="sum-val" style="${days<=3?'color:var(--red)':''}">${days>0?days+'天':'已到期'}</div></div>
        </div>
      </div>
      <div class="ec-detail" id="detail_${j.eventId}">${detailHtml}</div>
      <div class="ec-footer"><button class="leave-btn" onclick="leaveEvent(event,${ji})">退出活動</button></div>
    </div>`;
  }).join('');
}

function toggleDetail(id){ const el=document.getElementById('detail_'+id); if(el)el.classList.toggle('open'); }
function leaveEvent(e,idx){ e.stopPropagation(); const joined=getMemberJoined(); if(!confirm('確定退出「'+joined[idx].eventTitle+'」？'))return; joined.splice(idx,1); saveMemberJoined(joined); renderJoined(); PC_toast('已退出活動'); }

renderJoined();
</script>
</body></html>
